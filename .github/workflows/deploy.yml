name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_PUBLIC_API_URL: https://hto562wdv4bdtiino5cksgesgy0qskpg.lambda-url.ap-northeast-1.on.aws
  S3_BUCKET: linda-salon-booking-site-1
  CLOUDFRONT_DISTRIBUTION_ID: E2UTEOG9XAGM0G

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Sync to S3
        run: aws s3 sync out/ "s3://$S3_BUCKET" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
